name: build
on:
  schedule:
    # Daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      turboquant_ref:
        description: 'Git ref (tag/branch) to build'
        required: false
        type: string
        default: 'tqp-v0.3.0'
      cuda_arch:
        description: 'CUDA architecture (70=V100, 120=Blackwell)'
        required: false
        type: string
        default: '70'
permissions:
  packages: write
  contents: read
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          REF="${{ inputs.turboquant_ref || 'tqp-v0.3.0' }}"
          ARCH="${{ inputs.cuda_arch || '70' }}"
          IMAGE_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${IMAGE_LOWER}" >> $GITHUB_OUTPUT
          echo "tag=${REF}-sm${ARCH}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          build-args: |
            TURBOQUANT_REF=${{ inputs.turboquant_ref || 'tqp-v0.3.0' }}
            CUDA_ARCH=${{ inputs.cuda_arch || '70' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          ARCH="${{ inputs.cuda_arch || '70' }}"
          echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "TurboQuant ref: ${{ inputs.turboquant_ref || 'tqp-v0.3.0' }}" >> $GITHUB_STEP_SUMMARY
          echo "Target: sm_${ARCH}" >> $GITHUB_STEP_SUMMARY
          echo "CUDA: 12.8.1" >> $GITHUB_STEP_SUMMARY
          echo "GGML_CUDA_FA_ALL_QUANTS=ON" >> $GITHUB_STEP_SUMMARY
